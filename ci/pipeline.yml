---
meta:
  # Consolidated base config for PR status update tasks (5+ lines, reusable pattern)
  pr_status_update_config: &pr_status_update_config
    platform: linux
    inputs:
    - name: cf-ops-automation
    - name: cf-ops-automation-image
    - name: concourse-meta
    params:
    run:
      path: /bin/bash
      args:
        - -ce
        - |
          if [ "$SKIP_PR_STATUS" = "true" ]; then
            echo "Skipping PR status update (SKIP_PR_STATUS=true)"
            exit 0
          fi
          cd concourse-meta
            BUILD_TEAM=$(if [ -f build_team_name ];then cat build_team_name;fi)
            BUILD_PIPELINE=$(if [ -f build_pipeline_name ];then cat build_pipeline_name;fi)
            BUILD_JOB=$(if [ -f build_job_name ];then cat build_job_name;fi)
            BUILD_ID=$(if [ -f build_id ];then cat build_id;fi)
            BUILD_NAME=$(if [ -f build_name ];then cat build_name;fi)
            ATC_EXTERNAL_URL=$(if [ -f atc_external_url ];then cat atc_external_url;fi)
            BUILD_INFO=$(echo "$BUILD_TEAM/$BUILD_PIPELINE/$BUILD_JOB/$BUILD_NAME - $BUILD_ID")
          cd ..
          export CI_NAME=${BUILD_INFO}
          export CI_BUILD_ID=${BUILD_ID}
          export CI_BUILD_URL=$ATC_EXTERNAL_URL/builds/${BUILD_ID}          
          PR_NUMBER=$(cat cf-ops-automation-image/tag|cut -d'-' -f2)
          cd cf-ops-automation
          COMMIT_SHA=$(git log --format="%H" -1)
          echo "Updating commit $COMMIT_SHA (PR $PR_NUMBER) status to $STATUS with context: $CONTEXT"
          ci/update-github-commit-status.sh -c $COMMIT_SHA -i $CI_BUILD_URL -s $STATUS -x $CONTEXT
          echo ""
          echo "======= PR Summary ======="
          gh pr view --json title,number "$PR_NUMBER" | jq -r '(.number| tostring) + ": " + (.title | tostring)'


  # Consolidated PR status update common parameters (5+ lines, reusable pattern)
  pr_status_update_params: &pr_status_update_params
    GH_TOKEN: ((cf-ops-automation-git-hub-token))
    GH_REPO: ((cf-ops-automation-git-hub-owner))/((cf-ops-automation-git-hub-repository))
    SKIP_PR_STATUS: "false"

  # Consolidated on_failure handler for standard jobs
  on_failure_alert: &on_failure_alert
    put: slack-alert
    params:
      channel: ((slack-channel))
      text: |
        Failed to run <$ATC_EXTERNAL_URL/teams/$BUILD_TEAM_NAME/pipelines/$BUILD_PIPELINE_NAME/jobs/$BUILD_JOB_NAME/builds/$BUILD_NAME|$BUILD_PIPELINE_NAME/$BUILD_JOB_NAME/$BUILD_NAME>
        https://github.com/orange-cloudfoundry/cf-ops-automation/commit/$TEXT_FILE_CONTENT
      text_file: cf-ops-automation/.git/ref
      icon_url: http://cl.ly/image/3e1h0H3H2s0P/concourse-logo.png
      username: Concourse

  # Consolidated PR on_failure handler with PR-specific slack message pattern (5+ lines)
  PR_on_failure_alert: &PR_on_failure_alert
    put: slack-alert
    params:
      channel: ((slack-channel))
      text: |
        $TEXT_FILE_CONTENT
        Failed to run <$ATC_EXTERNAL_URL/teams/$BUILD_TEAM_NAME/pipelines/$BUILD_PIPELINE_NAME/jobs/$BUILD_JOB_NAME/builds/$BUILD_NAME|$BUILD_PIPELINE_NAME/$BUILD_JOB_NAME/$BUILD_NAME>
      text_file: cf-ops-automation/.git/resource/url
      icon_url: http://cl.ly/image/3e1h0H3H2s0P/concourse-logo.png
      username: Concourse

  # All PR status update task variants now reference consolidated configs via anchors
  tasks:
  - &update-status-success
    task: update-status-success
    image: cf-ops-automation-image
    attempts: 3
    config:
      <<: *pr_status_update_config
    params:
      <<: *pr_status_update_params
      STATUS: success
      CONTEXT: "concourse-ci/status"

  - &coa-failure-pr
    task: update-pr-status-failure
    image: cf-ops-automation-image
    attempts: 3
    config:
      <<: *pr_status_update_config
    params:
      <<: *pr_status_update_params
      STATUS: failure
      CONTEXT: "concourse-ci/status"

  - &coa-failure-acceptance-pr
    task: update-pr-status-failure
    image: cf-ops-automation-image
    attempts: 3
    config:
      <<: *pr_status_update_config
    params:
      <<: *pr_status_update_params
      STATUS: failure
      CONTEXT: concourse-ci/acceptance-tests

  - &coa-failure-it-pr
    task: update-pr-status-failure
    image: cf-ops-automation-image
    attempts: 3
    config:
      <<: *pr_status_update_config
    params:
      <<: *pr_status_update_params
      STATUS: failure
      CONTEXT: concourse-ci/integration-tests

  - &coa-failure-ut-pr
    task: update-pr-status-failure
    image: cf-ops-automation-image
    attempts: 3
    config:
      <<: *pr_status_update_config
    params:
      <<: *pr_status_update_params
      STATUS: failure
      CONTEXT: concourse-ci/unit-tests

  - &coa-pending-unit-tests
    task: update-unit-tests-status-pending
    image: cf-ops-automation-image
    attempts: 3
    config:
      <<: *pr_status_update_config
    params:
      <<: *pr_status_update_params
      STATUS: pending
      CONTEXT: "concourse-ci/unit-tests"
  - &coa-pending-integration-tests
    task: update-integration-tests-status-pending
    image: cf-ops-automation-image
    attempts: 3
    config:
      <<: *pr_status_update_config
    params:
      <<: *pr_status_update_params
      STATUS: pending
      CONTEXT: "concourse-ci/integration-tests"
  - &coa-pending-acceptance-tests
    task: update-acceptance-tests-status-pending
    image: cf-ops-automation-image
    attempts: 3
    config:
      <<: *pr_status_update_config
    params:
      <<: *pr_status_update_params
      STATUS: pending
      CONTEXT: "concourse-ci/acceptance-tests"

  - &coa-success-unit-tests
    task: update-status-success-uts
    image: cf-ops-automation-image
    attempts: 3
    config:
      <<: *pr_status_update_config
    params:
      <<: *pr_status_update_params
      STATUS: success
      CONTEXT: "concourse-ci/unit-tests"

  - &coa-success-acceptance-tests
    task: update-pr-status-success-ats
    image: cf-ops-automation-image
    attempts: 3
    config:
      <<: *pr_status_update_config
    params:
      <<: *pr_status_update_params
      STATUS: success
      CONTEXT: "concourse-ci/acceptance-tests"
  - &coa-success-integration-tests
    task: update-pr-status-success-its
    image: cf-ops-automation-image
    config: *pr_status_update_config
    attempts: 3
    params:
      GH_TOKEN: ((cf-ops-automation-git-hub-token))
      GH_REPO: ((cf-ops-automation-git-hub-owner))/((cf-ops-automation-git-hub-repository))
      STATUS: success
      CONTEXT: concourse-ci/integration-tests
      SKIP_PR_STATUS: "false"

  - &extract-cf-ops-automation-git-from-image
    task: extract-cf-ops-automation-git-from-image
    image: cf-ops-automation-image
    attempts: 3
    config:
      platform: linux
      inputs:
        - name: cf-ops-automation-image
      outputs:
        - name: cf-ops-automation
      run:
        path: /bin/bash
        args:
          - -ce
          - |
            git clone cf-ops-automation-image/rootfs/cf-ops-automation
            pushd cf-ops-automation-image/rootfs/cf-ops-automation
            echo "=== Git logs from COA image ==="
            git --no-pager log -5 --oneline
            popd
            pushd cf-ops-automation
            echo "=== Git logs EXTRACTED from COA image ==="
            git --no-pager log -5 --oneline

display:
  background_image: https://wallpapercave.com/download/pirate-flag-wallpapers-wp2022142
resource_types:
  - name: slack-notification
    type: registry-image
    source:
      repository: ((docker-registry-url))elpaasoci/slack-notification-resource

  - name: pull-request
    type: registry-image
    source:
      repository: ((docker-registry-url))elpaasoci/github-pr-resource

  - name: meta
    type: registry-image
    source:
      repository: ((docker-registry-url))elpaasoci/metadata-resource
      tag: 2.0.3-orange
resources:
- name: concourse-meta
  icon: file-document-box-search-outline
  type: meta

- name: slack-alert
  icon: slack
  type: slack-notification
  source:
    url: ((slack-webhook))

- name: cf-ops-automation-docker-image-develop
  icon: docker
  type: registry-image
  source:
    repository: ghcr.io/orange-cloudfoundry/cf-ops-automation
    username: ((cf-ops-automation-git-username))
    password: ((cf-ops-automation-git-hub-token))
    tag_regex: develop-.*
    # registry_mirror cannot be used as ghcr.io contains a registry hostname, so we skip harbor to avoid detection issues with new version

- name: cf-ops-automation-docker-image-pr
  icon: docker
  type: registry-image
  source:
    repository: ghcr.io/orange-cloudfoundry/cf-ops-automation
    username: ((cf-ops-automation-git-username))
    password: ((cf-ops-automation-git-hub-token))
    tag_regex: PR-.*-
#    registry_mirror:
#      host: ((ghcr-registry-url))ghcr.io
- name: version
  icon: tag-multiple
  type: semver
  source:
    driver: git
    uri: ((cf-ops-automation-git-uri))
    username: ((cf-ops-automation-git-username))
    password: ((cf-ops-automation-git-password))
    branch: version
    initial_version: 1.3.1
    file: version

- name: ci-develop
  icon: github-circle
  type: git
  source:
    uri: ((cf-ops-automation-git-uri))
    username: ((cf-ops-automation-git-username))
    password: ((cf-ops-automation-git-password))
    branch: ((cf-ops-automation-git-branch))
    skip_ssl_verification: ((cf-ops-automation-git-insecure))

- name: ci-master
  icon: github-circle
  type: git
  source:
    uri: ((cf-ops-automation-git-uri))
    username: ((cf-ops-automation-git-username))
    password: ((cf-ops-automation-git-password))
    branch: master
    skip_ssl_verification: ((cf-ops-automation-git-insecure))

- name: gh-release-draft
  icon: package-variant
  type: github-release
  source:
    owner: ((cf-ops-automation-git-hub-owner))
    repository: ((cf-ops-automation-git-hub-repository))
    access_token: ((cf-ops-automation-git-hub-token))
    drafts: true


jobs:
#  - name: auto-update-pipeline
#    serial: true
#    on_failure: *on_failure_alert
#    plan:
#      - in_parallel:
#        - get: coa-ci-secrets
#          trigger: true
#        - get: cf-ops-automation
#          resource: ci-develop
#          trigger: true
#      - set_pipeline: self
#        file: cf-ops-automation/ci/pipeline.yml
#        var_files:
#          - coa-ci-secrets/flexible-engine-env/credentials-fe-int.yml

  - name: unit-tests
    on_failure: *on_failure_alert
    serial: true
    plan:
    - in_parallel:
      - put: concourse-meta
      - get: cf-ops-automation
        resource: ci-develop
        trigger: true
      - get: cf-ops-automation-image
        resource: cf-ops-automation-docker-image-develop
        trigger: true
    - *coa-pending-unit-tests
    - task: run-tests
      attempts: 2
      image: cf-ops-automation-image
      timeout: 30m
      config: &unit_tests_config
        platform: linux
        inputs:
        - name: cf-ops-automation
        - name: cf-ops-automation-image
        - name: concourse-meta
        outputs:
        - name: test-reports
        run:
          dir: cf-ops-automation
          path: /bin/bash
          args:
          - -ce
          - |
            DOCKER_CUSTOM_REGISTRY=""
            echo "Testing environment config:"
            echo "---------------------------"
            echo "System: $(uname -a)"
            echo "Docker image fly $(fly --version)"
            ruby --version
            bundle --version
            bundle exec rspec --version
            qlty --version
            echo "DOCKER_CUSTOM_REGISTRY: $DOCKER_CUSTOM_REGISTRY"
            echo "---------------------------"
            echo "Setup Docker REGISTRY"
            export DOCKER_CUSTOM_REGISTRY=$(ruby -ryaml -e 'puts YAML.safe_load_file("ci/private.yml", aliases: true)["unit-test-prereqs"]["docker-registry-url"]')
            echo "DOCKER_CUSTOM_REGISTRY: $DOCKER_CUSTOM_REGISTRY"
            echo "---------------------------"
            echo "Setup Qlty pre-requisites"
            cd ../concourse-meta
            BUILD_TEAM=$(if [ -f build_team_name ];then cat build_team_name;fi)
            BUILD_PIPELINE=$(if [ -f build_pipeline_name ];then cat build_pipeline_name;fi)
            BUILD_JOB=$(if [ -f build_job_name ];then cat build_job_name;fi)
            BUILD_ID=$(if [ -f build_id ];then cat build_id;fi)
            BUILD_NAME=$(if [ -f build_name ];then cat build_name;fi)
            ATC_EXTERNAL_URL=$(if [ -f atc_external_url ];then cat atc_external_url;fi)
            BUILD_INFO=$(echo "$BUILD_TEAM/$BUILD_PIPELINE/$BUILD_JOB/$BUILD_NAME - $BUILD_ID")
            cd -
            export GIT_COMMIT_SHA=$(eval $GIT_SHA_CMD)
            export GIT_BRANCH=$(eval $GIT_BRANCH_CMD)
            export CI_NAME=${BUILD_INFO}
            export CI_BUILD_ID=${BUILD_ID}
            export CI_BUILD_URL=$ATC_EXTERNAL_URL/builds/${BUILD_ID}
            echo "Setup git config"
            git config --global user.email "coa@cf-automation.org"
            git config --global user.name "COA CI"
            echo "Running tests for $GIT_COMMIT_SHA@$GIT_BRANCH"
            fly -t cf-ops-automation login -u ((concourse-username)) -p '((concourse-password))' -k -c ((concourse-url))
            echo "Ensure local fly version is in sync with concourse"
            fly -t cf-ops-automation sync
            echo "Setup Qlty coverage"
            bundle exec rspec --format documentation --format html --out ../test-reports/rspec-results.html
            echo "Sending coverage to Qlty"
            if ! qlty coverage publish --tag unit --override-branch "$GIT_BRANCH" --override-commit-sha "$GIT_COMMIT_SHA" --override-build-id "$BUILD_ID" coverage/.resultset.json; then
              echo "Failed to run qlty. Re-launch in debug mode";
              echo "---------------------------"
              qlty coverage publish --tag unit --override-branch "$GIT_BRANCH" --override-commit-sha "$GIT_COMMIT_SHA" --override-build-id "$BUILD_ID" --debug coverage/.resultset.json;
            fi
        params:
          UNIT_TEST_PREREQS: ((unit-test-prereqs))
          QLTY_COVERAGE_TOKEN: ((qlty-coverage_token))
          COVERAGE: true
          GIT_SHA_CMD: cat .git/ref
          GIT_BRANCH_CMD: echo "((cf-ops-automation-git-branch))"
    - *coa-success-unit-tests

  - name: acceptance-tests
    on_failure: *on_failure_alert
    serial: true
    plan:
      - in_parallel:
        - put: concourse-meta
        - get: cf-ops-automation
          resource: ci-develop
          trigger: true
        - get: cf-ops-automation-image
          resource: cf-ops-automation-docker-image-develop
          passed: [unit-tests, integration-tests]
          trigger: true
        - get: version
      - *coa-pending-acceptance-tests
      - task: run-acceptance-tests
        attempts: 2
        image: cf-ops-automation-image
        timeout: 30m
        config: &acceptance_tests_config
          platform: linux
          inputs:
          - name: cf-ops-automation
          run:
            dir: cf-ops-automation
            path: /bin/bash
            args:
            - -ce
            - |
              ruby --version
              bundle --version
              export CUCUMBER_PUBLISH_QUIET=true
              bundle exec cucumber
      - task: ensure-changelog-is-working
        image: cf-ops-automation-image
        config: &changelog_working
          platform: linux
          inputs:
            - name: cf-ops-automation
            - name: version
          run:
            dir: cf-ops-automation
            path: /bin/bash
            args:
              - -ce
              - |
                RELEASE_VERSION=$(cat ../version/version)
                echo "Github changelog generator version: $(bundle exec github_changelog_generator --version)"
                bundle exec github_changelog_generator --no-author --future-release "v${RELEASE_VERSION}" --add-sections '{"misc":{"prefix":"**Miscellaneous:**","labels":["chore","CI/Build"]}}' --token $CHANGELOG_GITHUB_TOKEN #--unreleased-only # temporary disable due to https://github.com/github-changelog-generator/github-changelog-generator/issues/977
                cat CHANGELOG.md
          params:
            CHANGELOG_GITHUB_TOKEN: ((cf-ops-automation-git-hub-token))
      - *coa-success-acceptance-tests


  - name: integration-tests
    on_failure: *on_failure_alert
    serial_groups: [integration]
    serial: true
    plan:
      - in_parallel:
        - put: concourse-meta
        - get: cf-ops-automation
          resource: ci-develop
          trigger: true
        - get: cf-ops-automation-image
          resource: cf-ops-automation-docker-image-develop
          trigger: true
      - *coa-pending-integration-tests
      - task: setup-pre-requisites
        attempts: 1
#        image: cf-ops-automation-docker-image-develop
        image: cf-ops-automation-image
        config: &integration_tests_setup_pre_requisites_task_config
          platform: linux
          inputs:
          - name: cf-ops-automation
          outputs:
          - name: prereqs
          run:
            path: /bin/bash
            args:
            - -ce
            - |
              echo "Setup pre-requisites"
              cp -v $COA_BASE_DIR/cf-ops-automation/ci/bootstrap_coa_env/*-prereqs.yml  prereqs/
              echo "  bot-github-access-token: ((cf-ops-automation-git-hub-token))" >> prereqs/pipeline-vars-prereqs.yml
              echo "  slack-webhook: ((slack-webhook))" >> prereqs/pipeline-vars-prereqs.yml
              echo "  slack-channel: ((slack-channel))" >> prereqs/pipeline-vars-prereqs.yml
              echo "  slack-proxy:" >> prereqs/pipeline-vars-prereqs.yml
              echo "  slack-disable: ((slack-disable-it))" >> prereqs/pipeline-vars-prereqs.yml
              echo "  slack-proxy-https-tunnel:" >> prereqs/pipeline-vars-prereqs.yml
              if [ -z "$INTEGRATION_TEST_PREREQS" ]; then
                echo "Error \$INTEGRATION_TEST_PREREQS is empty"
                exit 1
              fi
              printenv INTEGRATION_TEST_PREREQS > prereqs/integration-test-prereqs.yml
              #ruby -ryaml -e 'puts YAML.load(ENV["CLOUD_CONFIG_PREREQS"]).to_yaml' > prereqs/cloud-config-prereqs.yml
              cf-ops-automation/ci/scripts/deploy-bosh-releases.rb prereqs/bosh-deployment-manifest-prereqs.yml
              echo "removing 'ntp' release and 'bosh-deployment-sample' deployment"
              bosh delete-deployment --force -d bosh-deployment-sample --non-interactive
              bosh delete-deployment --force -d hello-world-root-depls-release-precompile-deployment --non-interactive
              bosh delete-release --non-interactive ntp
              bosh deployments
              bosh releases
              bosh stemcells
              echo "Setup DONE"
        # it is not possible to include it as config param, otherwise we get an deserialization error
        params: &integration_tests_setup_pre_requisites_task_config_params
            INTEGRATION_TEST_PREREQS: ((integration-test-prereqs))
            BOSH_ENVIRONMENT: ((integration-test-prereqs.bosh.bosh_environment))
            BOSH_CLIENT: ((integration-test-prereqs.bosh.bosh_client))
            BOSH_CLIENT_SECRET: "((integration-test-prereqs.bosh.bosh_client_secret))"
            BOSH_CA_CERT: ((integration-test-prereqs.bosh.bosh_ca_cert))
            COA_BASE_DIR: "" #cf-ops-automation-image/rootfs
      - task: check-ci-skip-pre-requisites
        attempts: 1
#        image: cf-ops-automation-docker-image-develop
        image: cf-ops-automation-image
        config:
          platform: linux
          inputs:
            - name: cf-ops-automation
          run:
            path: /bin/bash
            args:
              - -c
              - |
                echo "Checking commit including skip ci"
                cd cf-ops-automation
                ci_skip_count=$(git log -1|grep -cE "ci skip|skip ci")
                if [ "$ci_skip_count" -ne 0 ]; then
                  echo "ERROR: Cannot execute tests when [ci skip|skip ci] is detected"
                  exit 1
                else 
                  echo "No [ci skip|skip ci] detected, continuing !"
                fi
      - task: setup-credhub-pre-requisites
        attempts: 1
        config: &integration_tests_setup_credhub_pre_requisites_task_config
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ((docker-registry-url))elpaasoci/bosh-cli-v2
              tag: 6031305bac1fd9e312162e19874bb872c5315ca1
          inputs:
            - name: cf-ops-automation

          params:
            CREDHUB_SERVER: ((integration-test-prereqs.credhub.server))
            CREDHUB_CLIENT: ((integration-test-prereqs.credhub.client))
            CREDHUB_SECRET: "((integration-test-prereqs.credhub.secret))"
            CREDHUB_CA_CERT: ((integration-test-prereqs.credhub.ca-cert))
            CREDHUB_CONCOURSE_NAMESPACE: "/coa-ci-concourse"
            DOCKER_REGISTRY_URL: ((integration-test-prereqs.docker-registry-url))
          run:
            path: /bin/bash
            args:
              - -ce
              - |
                echo "Setup Credhub pre-requisites"
                ca_cert() {
                    local ca_cert=$1
                    local tmp=$(mktemp -d)
                    local ca_cert_file="${tmp}/ca.pem"
                    echo "writting credhub certificates to ${ca_cert_file}"
                    echo $ca_cert >> $ca_cert_file
                }
                ca_cert ${CREDHUB_CA_CERT}
                credhub login
                credhub --version
                credhub f --path {CREDHUB_CONCOURSE_NAMESPACE} 
                #credhub set -n
                ruby --version
                cd cf-ops-automation
                CURRENT_TEAMS=$(grep -E "^[[:space:]]*team:" docs/reference_dataset/config_repository/hello-world-root-depls/ci-deployment-overview.yml|sort|uniq|cut -d':' -f2|cut -c2-)
                CONCOURSE_TEAMS="main $CURRENT_TEAMS"
                echo "Teams to process: ${CONCOURSE_TEAMS}"
                for team in ${CONCOURSE_TEAMS};do
                  credhub set --type value -n "${CREDHUB_CONCOURSE_NAMESPACE}/${team}/docker-registry-url" -v "$DOCKER_REGISTRY_URL"
                done

      - task: setup-pre-requisites-oci-registry
        attempts: 1
#        image: cf-ops-automation-docker-image-develop
        image: cf-ops-automation-image
        config: &integration_tests_setup_pre_requisites_oci_registry_task_config
          platform: linux
          inputs:
            - name: cf-ops-automation
          run:
            path: /bin/bash
            args:
              - -ce
              - |
                echo "Setup pre-requisites for OCI registry"
                cf-ops-automation/ci/scripts/setup-oci-registry.sh
                echo "Setup DONE"
          # it is not possible to include it as config param, otherwise we get an deserialization error
          params:
            OCI_REGISTRY_USERNAME: ((integration-test-prereqs.oci-registry.username))
            OCI_REGISTRY_PASSWORD: ((integration-test-prereqs.oci-registry.password))
            OCI_REGISTRY_URL: ((integration-test-prereqs.oci-registry.url))

      - task: upload-pipelines
        attempts: 2
#        image: cf-ops-automation-docker-image-develop
        image: cf-ops-automation-image
        config: &integration_tests_upload-pipelines_task_config
          platform: linux
          inputs:
            - name: cf-ops-automation
            - name: prereqs
          outputs:
            - name: coa-logs
          run:
            path: /bin/bash
            args:
              - -c
              - |
                cd cf-ops-automation/
                echo "Git configuration:"
                git --version
                git --no-pager config -l
                echo "========================"
                echo "removing 'url.https://.insteadof' properties"
                git config --unset url.https://.insteadof
                cd ..
#                git_server_ip=$(bosh vms -d git-server --json|jq -r .Tables[].Rows[].ips)
#                mkdir empty-repo
#                cd empty-repo
