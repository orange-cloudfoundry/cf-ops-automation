  - name: update-documentation
    on_failure: *on_failure_alert
    serial: true
    plan:
      - in_parallel:
        - put: concourse-meta
        - get: cf-ops-automation
          resource: ci-develop
          trigger: true
          passed: [acceptance-tests]
        - get: cf-ops-automation-image
          resource: cf-ops-automation-docker-image-develop
          passed: [acceptance-tests]

      - task: generate-living-documentation
        image: cf-ops-automation-image
        config:
          platform: linux
          inputs:
          - name: cf-ops-automation
          outputs:
          - name: cf-ops-automation-living-documentation
          run:
            path: /bin/bash
            args:
            - -ce
            - |
              git config --global user.email "$GIT_USER_EMAIL"
              git config --global user.name "$GIT_USER_NAME"

              git clone cf-ops-automation cf-ops-automation-living-documentation
              cd cf-ops-automation-living-documentation/
              gh-md-toc --insert Readme.md
              cat Readme.md|grep -v 'Added by:' >tmp.md && mv tmp.md Readme.md
              git add -A
              CHANGE_DETECTED_COUNTER=$(git status --porcelain|wc -l)
              if [ ${CHANGE_DETECTED_COUNTER} -gt 0 ]
              then
                 git commit -m "Living documentation auto-update"
              else
                 echo "No change detected, skip commit"
              fi
          params:
            GIT_USER_NAME: "Orange Cloud Foundry SKC CI Server"
            GIT_USER_EMAIL: "codex.clara-cloud-ops@orange.com"
      - put: ci-develop
        params:
          repository: cf-ops-automation-living-documentation
          rebase: true
      - *update-status-success


  - name: merge-to-master
    on_failure: *on_failure_alert
    serial: true
    plan:
      - in_parallel:
        - get: ci-master
        - get: cf-ops-automation
          resource: ci-develop
          trigger: true
          passed: [update-documentation]
        - get: cf-ops-automation-image
          resource: cf-ops-automation-docker-image-develop
          passed: [update-documentation]
      - put: ci-master
        params:
          repository: cf-ops-automation

  - name: ship-it
    on_failure: *on_failure_alert
    serial: true
    serial_groups: [version]
    plan:
      - in_parallel:
        - get: version
          params: {bump: final}
          attempts: 2
        - get: cf-ops-automation
          resource: ci-master
          passed: [merge-to-master]
          attempts: 2
#        - get: cf-ops-automation-docker-image-develop
#          passed: [merge-to-master]
      - task: generate-changelog
        attempts: 2
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ((ghcr-registry-url))ghcr.io/orange-cloudfoundry/cf-ops-automation
              tag_regex: develop-.*
          inputs:
          - name: cf-ops-automation
          - name: version
          outputs:
          - name: cf-ops-automation-changelog
          run:
            path: /bin/bash
            args:
            - -ce
            - |
              git config --global user.email "$GIT_USER_EMAIL"
              git config --global user.name "$GIT_USER_NAME"

              RELEASE_VERSION=$(cat version/version)
              git clone cf-ops-automation cf-ops-automation-changelog
              cd cf-ops-automation-changelog/
              echo "Github changelog generator version: $(bundle exec github_changelog_generator --version)"
              bundle exec github_changelog_generator --no-author --future-release "v${RELEASE_VERSION}" --add-sections '{"misc":{"prefix":"**Miscellaneous:**","labels":["chore","CI/Build"]}}' --token $CHANGELOG_GITHUB_TOKEN
              mkdir -p docs/features/
              export CUCUMBER_PUBLISH_QUIET=true
              bundle exec cucumber -f html --out docs/features/features.html -f pretty --out docs/features/features.md -f pretty --no-color --no-source
              git add -A
              CHANGE_DETECTED_COUNTER=$(git status --porcelain|wc -l)
              if [ ${CHANGE_DETECTED_COUNTER} -gt 0 ]
              then
                 git commit -m "auto-update for release ${RELEASE_VERSION} - Changelog update"
              else
                 echo "No change detected, skip commit"
              fi
          params:
            GIT_USER_NAME: "Orange Cloud Foundry SKC CI Server"
            GIT_USER_EMAIL: "codex.clara-cloud-ops@orange.com"
            CHANGELOG_GITHUB_TOKEN: ((cf-ops-automation-git-hub-token))
      - put: ci-master
        attempts: 2
        params:
          repository: cf-ops-automation-changelog
          rebase: true
      - task: generate-release
#        image: cf-ops-automation-docker-image-source
        attempts: 2
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ((ghcr-registry-url))ghcr.io/orange-cloudfoundry/cf-ops-automation
              tag_regex: develop-.*
          inputs:
          - name: cf-ops-automation
          - name: version
          outputs:
          - name: github-info
          run:
            dir: cf-ops-automation
            path: /bin/bash
            args:
            - -ce
            - |
              RELEASE_VERSION=$(cat ../version/version)
              OUTPUT_DIR="../github-info"
              OUTPUT_FILE="${OUTPUT_DIR}/github_release.md"
              echo "Github changelog generator version: $(bundle exec github_changelog_generator --version)"
              bundle exec github_changelog_generator --no-author  -o ${OUTPUT_FILE} --header-label "**Release notes**" --future-release "v${RELEASE_VERSION}" --token $CHANGELOG_GITHUB_TOKEN --unreleased-only
              cd ${OUTPUT_DIR}
              tar czvf cf-ops-automation.tgz ../cf-ops-automation
          params:
            CHANGELOG_GITHUB_TOKEN: ((cf-ops-automation-git-hub-token))
      - put: gh-release-draft
        attempts: 2
        params:
          name: version/version
          tag_prefix: v
          tag: version/version
          body: github-info/github_release.md
          globs:
           - github-info/cf-ops-automation.tgz
      - task: promote-draft-to-final-release
        attempts: 2
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ((ghcr-registry-url))ghcr.io/orange-cloudfoundry/cf-ops-automation
              tag_regex: develop-.*
          inputs:
            - name: version
          run:
            path: /bin/bash
            args:
              - -ce
              - |
                RELEASE_VERSION=$(cat ./version/version)
                gh release edit ${TAG_PREFIX}${RELEASE_VERSION} --draft=false
          params:
            TAG_PREFIX: v
            GIT_USER_NAME: "Orange Cloud Foundry SKC CI Server"   # credential_leak_validated
            GIT_USER_EMAIL: "codex.clara-cloud-ops@orange.com"    # credential_leak_validated
            GH_TOKEN: ((cf-ops-automation-git-hub-token)) # https://cli.github.com/manual/gh_help_environment: GH_TOKEN, GITHUB_TOKEN (in order of precedence): an authentication token that will be used when a command targets either
            GH_REPO: orange-cloudfoundry/cf-ops-automation # https://cli.github.com/manual/gh_help_environment: GH_REPO: specify the GitHub repository in the [HOST/]OWNER/REPO format for commands that otherwise operate on a local repository.
      - put: version
        attempts: 2
        params: {bump: patch}

  - name: merge-changelog-to-develop
    on_failure: *on_failure_alert
    serial: true
    plan:
      - in_parallel:
        - get: cf-ops-automation
          attempts: 2
          resource: ci-master
          trigger: true
          passed: [ship-it]
        - get: ci-develop
          attempts: 2
      - put: ci-develop
        attempts: 2
        params:
          repository: cf-ops-automation

#  - name: pull-requests-start
#    plan:
#      - in_parallel:
#          - put:  concourse-meta
#          - get: cf-ops-automation-image
#            resource: cf-ops-automation-docker-image-pr
#            version: every
#            trigger: true
#      - *extract-cf-ops-automation-git-from-image
#      - *coa-pending-unit-tests
#      - *coa-pending-integration-tests
#      - *coa-pending-acceptance-tests

  - name: pull-requests-unit-tests
    on_failure: *PR_on_failure_alert
    serial: true
    plan:
      - in_parallel:
        - put: concourse-meta
        - get: cf-ops-automation-image
          resource: cf-ops-automation-docker-image-pr
#          passed: [ pull-requests-start ]
          version: every
          trigger: true
      - *extract-cf-ops-automation-git-from-image
      - *coa-pending-unit-tests
      - task: test-pr
        attempts: 2
        image: cf-ops-automation-image
        timeout: 30m
        config: *unit_tests_config
        params:
          GIT_SHA_CMD: git log --format="%H" -1
          GIT_BRANCH_CMD: cat ../cf-ops-automation-image/tag
        on_failure:
          in_parallel:
            - *coa-failure-pr
            - *coa-failure-ut-pr
      - *coa-success-unit-tests

  - name: pull-requests-acceptance-tests
    on_failure: *PR_on_failure_alert
    serial: true
    plan:
      - in_parallel:
          - put: concourse-meta
          - get: cf-ops-automation-image
            resource: cf-ops-automation-docker-image-pr
#            passed: [pull-requests-start]
            version: every
            trigger: true
          - get: version
      - *extract-cf-ops-automation-git-from-image
      - *coa-pending-acceptance-tests
      - task: acceptance-test-pr
        attempts: 2
        image: cf-ops-automation-image
        timeout: 30m
        config: *acceptance_tests_config
        on_failure:
          in_parallel:
            - *coa-failure-pr
            - *coa-failure-acceptance-pr
      - task: ensure-changelog-is-working
        image: cf-ops-automation-image
        config: *changelog_working
        on_failure:
          in_parallel:
            - *coa-failure-pr
            - *coa-failure-acceptance-pr
      - *coa-success-acceptance-tests

  - name: pull-requests-integration-tests
    on_failure: *PR_on_failure_alert
    serial_groups: [integration]
    serial: true
    plan:
      - in_parallel:
        - put: concourse-meta
        - get: cf-ops-automation-image
          resource: cf-ops-automation-docker-image-pr
#          passed: [pull-requests-start]
          version: every
          trigger: true
      - *extract-cf-ops-automation-git-from-image
      - *coa-pending-integration-tests
      - task: setup-pre-requisites
        attempts: 1
        image: cf-ops-automation-image
        config: *integration_tests_setup_pre_requisites_task_config
        on_failure:
          in_parallel:
            - *coa-failure-pr
            - *coa-failure-it-pr
        # it is not possible to include it as config param, otherwise we get an deserialization error
        params: *integration_tests_setup_pre_requisites_task_config_params
      - task: setup-credhub-pre-requisites
        attempts: 1
        config: *integration_tests_setup_credhub_pre_requisites_task_config
        on_failure:
          in_parallel:
            - *coa-failure-pr
            - *coa-failure-it-pr
      - task: setup-pre-requisites-oci-registry
        attempts: 1
        image: cf-ops-automation-image
        config: *integration_tests_setup_pre_requisites_oci_registry_task_config
        on_failure:
          in_parallel:
            - *coa-failure-pr
            - *coa-failure-it-pr
      - task: upload-pipelines
        attempts: 2
        image: cf-ops-automation-image
        config: *integration_tests_upload-pipelines_task_config
        on_failure:
          in_parallel:
            - *coa-failure-pr
            - *coa-failure-it-pr
      - *coa-success-integration-tests

  - name: pull-requests-success
    plan:
      - in_parallel:
        - put:  concourse-meta
        - get: cf-ops-automation-image
          resource: cf-ops-automation-docker-image-pr
          trigger: true
          passed: [pull-requests-unit-tests, pull-requests-integration-tests,pull-requests-acceptance-tests]
      - *extract-cf-ops-automation-git-from-image
      - *update-status-success

  - name: major
    on_failure: *on_failure_alert
    serial_groups: [version]
    plan:
    - get: version
      params: {bump: major}
    - put: version
      params: {file: version/version}

  - name: minor
    on_failure: *on_failure_alert
    serial_groups: [version]
    plan:
    - get: version
      params: {bump: minor}
    - put: version
      params: {file: version/version}

  - name: patch
    on_failure: *on_failure_alert
    serial_groups: [version]
    plan:
    - get: version
      params: {bump: patch}
    - put: version
      params: {file: version/version}

groups:
  - name: overview
    jobs:
      - "*"

  - name: releases
    jobs:
      - patch
      - minor
      - major
      - unit-tests
      - acceptance-tests
      - integration-tests
      - update-documentation
      - merge-to-master
      - ship-it
      - merge-changelog-to-develop

  - name: pull-requests
    jobs:
#      - pull-requests-start
      - pull-requests-unit-tests
      - pull-requests-acceptance-tests
      - pull-requests-integration-tests
      - pull-requests-success
