name: Publish develop image

on:
  push:
    branches:
      - develop
    paths:
      - Dockerfile
      - Gemfile
      - Gemfile.lock
      - .github/workflows/publish-develop-image.yml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push develop image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cf-ops-automation:develop-${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
