name: Publish PR image

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      packages: write
    env:
      PR_TAG: PR-${{ github.event.pull_request.number || github.run_number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute short SHA
        run: echo "SHORT_SHA=${PR_HEAD_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Set build-image status to pending
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.PR_HEAD_SHA,
              state: 'pending',
              context: 'build-image',
              description: 'Building PR docker image'
            });

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PR image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cf-ops-automation:${{ env.PR_TAG }}-${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set build-image status to success
        if: success() && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.PR_HEAD_SHA,
              state: 'success',
              context: 'build-image',
              description: `Published ${process.env.PR_TAG}-${{ env.SHORT_SHA }}`
            });

      - name: Set build-image status to failure
        if: failure() && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.PR_HEAD_SHA,
              state: 'failure',
              context: 'build-image',
              description: 'Failed to publish PR image ${process.env.PR_TAG}-${{ env.SHORT_SHA }}'
            });



